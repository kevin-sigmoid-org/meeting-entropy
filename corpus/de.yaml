  anglizismen:
    weight: 6
    words:
      - "Meeting"
      - "Call"
      - "Deadline"
      - "Feedback"
      - "Workflow"
      - "Performance"
    sarcasm_level: "MITTEL"
    note: "Denglisch at its finest."

  vague_zeitlich:
    weight: 5
